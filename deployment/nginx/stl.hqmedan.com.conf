# =======================================================
# NGINX CONFIGURATION - stl.hqmedan.com
# File: /etc/nginx/sites-available/stl.hqmedan.com
# Symlink: ln -s /etc/nginx/sites-available/stl.hqmedan.com /etc/nginx/sites-enabled/
# =======================================================

# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name stl.hqmedan.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name stl.hqmedan.com;

    # =====================
    # SSL Certificate (Let's Encrypt)
    # Install dengan: certbot --nginx -d stl.hqmedan.com
    # =====================
    ssl_certificate /etc/letsencrypt/live/stl.hqmedan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stl.hqmedan.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # =====================
    # Security Headers
    # =====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =====================
    # Logging
    # =====================
    access_log /var/log/nginx/stl.hqmedan.com.access.log;
    error_log /var/log/nginx/stl.hqmedan.com.error.log;

    # =====================
    # Root Directory
    # Upload folder aplikasi_stl ke: /www/wwwroot/stl.hqmedan.com
    # =====================
    root /www/wwwroot/stl.hqmedan.com;
    index index.html index.php;

    # =====================
    # Static files
    # =====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =====================
    # PHP API Handler
    # =====================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-8.1.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $host;

        # Environment variables untuk PHP app (SSO + PostgreSQL shared sso_portal DB)
        fastcgi_param SSO_PORTAL_URL       "http://localhost:3000";
        fastcgi_param SSO_PUBLIC_URL       "https://portal.hqmedan.com";
        fastcgi_param SSO_STL_CLIENT_ID    "serah-terima-client";
        fastcgi_param SSO_STL_CLIENT_SECRET "serah-terima-secret-CHANGE-ME";
        fastcgi_param STL_DB_DSN           "pgsql:host=localhost;port=5432;dbname=sso_portal";
        fastcgi_param STL_DB_USER          "SSO_Project";
        fastcgi_param STL_DB_PASS          "P@ssw0rd!!";
    }

    # =====================
    # Block akses ke file sensitif
    # =====================
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~ /config\.php$ {
        deny all;
    }

    location ~ /db_connect\.php$ {
        deny all;
    }
}
