# =======================================================
# NGINX CONFIGURATION - portal.hqmedan.com
# File: /etc/nginx/sites-available/portal.hqmedan.com
# =======================================================

# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name portal.hqmedan.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name portal.hqmedan.com;

    # =====================
    # SSL Certificate (Let's Encrypt)
    # Install dengan: certbot --nginx -d portal.hqmedan.com
    # =====================
    ssl_certificate /etc/letsencrypt/live/portal.hqmedan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.hqmedan.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # =====================
    # Security Headers
    # =====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =====================
    # Logging
    # =====================
    access_log /var/log/nginx/portal.hqmedan.com.access.log;
    error_log /var/log/nginx/portal.hqmedan.com.error.log;

    # =====================
    # Gzip Compression
    # =====================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # =====================
    # Proxy ke Node.js App
    # =====================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # =====================
    # Static Files Caching
    # =====================
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Block akses ke file sensitif
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
