<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi 2FA – Portal HQ Medan</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230ea5e9'/%3E%3Cpath d='M32 14a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 16a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm-18 20c0-9.94 8.06-18 18-18s18 8.06 18 18' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 40%, #0ea5e9 80%, #38bdf8 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(3,105,161,0.22);
      padding: 40px 36px;
      width: 100%; max-width: 420px;
    }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 24px 0; }
    .otp-digit {
      width: 52px; height: 64px;
      border: 2px solid #e2e8f0; border-radius: 14px;
      font-size: 28px; font-weight: 700; color: #0f172a;
      text-align: center; background: #f8fafc; outline: none;
      transition: all 0.15s; caret-color: #0ea5e9;
    }
    .otp-digit:focus { border-color: #0ea5e9; background: #fff; box-shadow: 0 0 0 3px rgba(14,165,233,0.14); }
    .otp-digit.filled { border-color: #0284c7; background: #e0f2fe; }
    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px;
      border-radius: 10px; font-size: 13.5px; font-weight: 500; margin-bottom: 16px; }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .timer-bar { height: 3px; background: #e0f2fe; border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
    .timer-fill { height: 100%; background: linear-gradient(90deg, #0369a1, #0ea5e9); transition: width 1s linear; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:24px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#0369a1,#0ea5e9);box-shadow:0 8px 20px rgba(14,165,233,0.3);margin-bottom:14px;">
        <i class="fa-solid fa-shield-halved" style="color:#fff;font-size:26px;"></i>
      </div>
      <h1 style="font-size:20px;font-weight:800;color:#0f172a;margin:0 0 6px;">Verifikasi 2 Langkah</h1>
      <p style="font-size:13px;color:#64748b;line-height:1.6;max-width:280px;margin:0 auto;">
        Buka <strong>Google Authenticator</strong> dan masukkan kode 6 digit untuk akun <strong>Portal HQ Medan</strong>
      </p>
    </div>

    <!-- Timer bar (5 menit) -->
    <div class="timer-bar"><div id="timerFill" class="timer-fill" style="width:100%;"></div></div>

    <!-- Alert -->
    <div id="alertBox" style="display:none;" class="alert"></div>

    <!-- OTP Input -->
    <form id="otpForm" onsubmit="handleVerify(event)">
      <div class="otp-inputs" id="otpInputs">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="0" autocomplete="one-time-code">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="1">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="2">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="3">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="4">
        <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" data-idx="5">
      </div>

      <button type="submit" id="submitBtn" class="btn-primary" disabled>
        <span id="btnContent"><i class="fa-solid fa-circle-check text-sm"></i> Verifikasi</span>
      </button>
    </form>

    <!-- Resend info -->
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:20px;line-height:1.7;">
      Kode berubah setiap 30 detik secara otomatis.<br>
      Tidak bisa masuk? 
      <a href="/login" style="color:#0284c7;font-weight:600;text-decoration:none;">Login ulang</a>
    </p>
  </div>

  <script>
    // ── State ──
    const TEMP_KEY = '_2fa_tmp';
    const REDIRECT_KEY = '_2fa_redirect';

    let tempToken = sessionStorage.getItem(TEMP_KEY);
    if (!tempToken) {
      window.location.href = '/login';
    }

    // ── Timer 5 menit (sinkron dengan exp temp_token) ──
    const TOTAL_SECS = 5 * 60;
    let remaining = TOTAL_SECS;
    const timerFill = document.getElementById('timerFill');
    const timerInterval = setInterval(() => {
      remaining--;
      timerFill.style.width = (remaining / TOTAL_SECS * 100) + '%';
      if (remaining <= 0) {
        clearInterval(timerInterval);
        showAlert('error', 'Sesi login telah kedaluwarsa. <a href="/login" class="font-semibold underline">Login ulang</a>');
        document.getElementById('submitBtn').disabled = true;
        document.querySelectorAll('.otp-digit').forEach(d => d.disabled = true);
      }
    }, 1000);

    // ── OTP digit inputs: auto-advance, backspace, paste ──
    const digits = Array.from(document.querySelectorAll('.otp-digit'));
    const submitBtn = document.getElementById('submitBtn');

    digits.forEach((input, i) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(-1);
        e.target.classList.toggle('filled', !!e.target.value);
        if (val && i < 5) digits[i + 1].focus();
        checkReady();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          if (!e.target.value && i > 0) {
            digits[i - 1].value = '';
            digits[i - 1].classList.remove('filled');
            digits[i - 1].focus();
          }
          e.target.classList.remove('filled');
          checkReady();
        }
      });
    });

    // ── Paste: accept 6-digit string ──
    document.getElementById('otpInputs').addEventListener('paste', (e) => {
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      if (!text) return;
      e.preventDefault();
      digits.forEach((d, i) => {
        d.value = text[i] || '';
        d.classList.toggle('filled', !!d.value);
      });
      digits[Math.min(text.length, 5)].focus();
      checkReady();
    });

    function checkReady() {
      const code = digits.map(d => d.value).join('');
      submitBtn.disabled = code.length !== 6;
    }

    function getOtp() {
      return digits.map(d => d.value).join('');
    }

    function showAlert(type, html) {
      const el = document.getElementById('alertBox');
      el.style.display = 'flex';
      el.className = 'alert ' + (type === 'error' ? 'alert-error' : 'alert-success');
      el.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} flex-shrink-0 mt-0.5"></i><span>${html}</span>`;
    }

    function clearAlert() {
      const el = document.getElementById('alertBox');
      el.style.display = 'none';
    }

    // ── Submit ──
    async function handleVerify(e) {
      e.preventDefault();
      clearAlert();

      const otp_code = getOtp();
      if (otp_code.length !== 6) return;

      const btn     = document.getElementById('submitBtn');
      const content = document.getElementById('btnContent');
      btn.disabled  = true;
      content.innerHTML = '<div class="spinner"></div> Memverifikasi...';

      try {
        const res  = await fetch('/api/auth/2fa/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ temp_token: tempToken, otp_code }),
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert('error', data.error || 'Kode OTP tidak valid.');
          // Reset inputs
          digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
          digits[0].focus();
          btn.disabled = true;
          content.innerHTML = '<i class="fa-solid fa-circle-check text-sm"></i> Verifikasi';
          return;
        }

        // Berhasil — bersihkan temp token
        sessionStorage.removeItem(TEMP_KEY);
        clearInterval(timerInterval);

        content.innerHTML = '<i class="fa-solid fa-check text-sm"></i> Berhasil!';
        showAlert('success', 'Verifikasi berhasil! Mengarahkan...');

        const redirect = sessionStorage.getItem(REDIRECT_KEY);
        sessionStorage.removeItem(REDIRECT_KEY);
        setTimeout(() => {
          window.location.href = redirect || '/dashboard';
        }, 800);

      } catch {
        showAlert('error', 'Koneksi gagal. Periksa jaringan Anda.');
        btn.disabled = false;
        content.innerHTML = '<i class="fa-solid fa-circle-check text-sm"></i> Verifikasi';
      }
    }

    // Auto-focus digit pertama
    digits[0].focus();
  </script>
</body>
</html>
