<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SSO Portal HQ Medan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #0a0f1e; }
    .bg-scene { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
    .bg-scene::before {
      content: ''; position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
      top: -100px; left: -100px; animation: drift 12s ease-in-out infinite alternate;
    }
    @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(60px,40px); } }
    .form-card { background: #ffffff; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .input-field { transition: all 0.25s; background: #f8fafc; border: 1.5px solid #e2e8f0; }
    .input-field:focus { background: #fff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); outline: none; }
    .btn-reset {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #0ea5e9 100%);
      box-shadow: 0 8px 30px rgba(59,130,246,0.4); transition: all 0.3s;
    }
    .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59,130,246,0.5); }
    .logo-shield { background: linear-gradient(135deg, #1d4ed8, #0ea5e9); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
  <div class="bg-scene"></div>

  <div class="w-full max-w-md relative z-10">
    <div class="form-card rounded-3xl p-8">
      <!-- Header -->
      <div class="text-center mb-7">
        <div class="logo-shield w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-key text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
        <p class="text-gray-500 text-sm mt-1.5">Masukkan password baru yang kuat untuk akun Anda</p>
      </div>

      <!-- Alert -->
      <div id="alertMsg" class="hidden mb-5 p-4 rounded-2xl text-sm border flex items-center gap-2"></div>

      <form id="resetForm" onsubmit="resetPassword(event)" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password Baru</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-lock text-gray-400 text-sm"></i>
            </div>
            <input type="password" id="newPassword" required minlength="8"
                   class="input-field w-full pl-11 pr-4 py-3 rounded-xl text-sm font-medium"
                   placeholder="Min. 8 karakter">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Konfirmasi Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-key text-gray-400 text-sm"></i>
            </div>
            <input type="password" id="confirmPassword" required
                   class="input-field w-full pl-11 pr-4 py-3 rounded-xl text-sm font-medium"
                   placeholder="Ulangi password baru">
          </div>
        </div>
        <button type="submit" class="btn-reset w-full text-white py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
          <i class="fa-solid fa-shield-check"></i>
          Reset Password Sekarang
        </button>
        <a href="/login" class="flex items-center justify-center gap-2 text-sm text-blue-600 hover:text-blue-700 font-semibold transition-colors">
          <i class="fa-solid fa-arrow-left text-xs"></i>
          Kembali ke Login
        </a>
      </form>

      <!-- Footer -->
      <div class="mt-6 pt-5 border-t border-gray-100 flex items-center justify-center gap-2 text-xs text-gray-400">
        <i class="fa-solid fa-shield-halved text-blue-400"></i>
        <span>SSO Portal · portal.hqmedan.com</span>
      </div>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('resetForm').innerHTML = `
        <div class="text-center py-6">
          <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-link-slash text-red-500 text-xl"></i>
          </div>
          <h3 class="text-lg font-bold text-gray-800 mb-2">Link Tidak Valid</h3>
          <p class="text-gray-500 text-sm">Link ini tidak valid atau sudah kadaluarsa.</p>
          <a href="/login" class="inline-flex items-center gap-2 mt-5 text-blue-600 text-sm font-semibold hover:text-blue-700">
            <i class="fa-solid fa-arrow-left text-xs"></i> Kembali ke Login
          </a>
        </div>`;
    }

    async function resetPassword(e) {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const alertEl = document.getElementById('alertMsg');

      if (newPassword !== confirmPassword) {
        alertEl.className = 'mb-5 p-4 rounded-2xl text-sm border bg-red-50 text-red-700 border-red-200 flex items-center gap-2';
        alertEl.innerHTML = '<i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>Password dan konfirmasi tidak cocok.';
        alertEl.classList.remove('hidden');
        return;
      }

      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();
      const icon = res.ok ? 'fa-circle-check' : 'fa-circle-exclamation';
      alertEl.className = `mb-5 p-4 rounded-2xl text-sm border flex items-center gap-2 ${res.ok ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`;
      alertEl.innerHTML = `<i class="fa-solid ${icon} flex-shrink-0"></i>${data.message || data.error}`;
      alertEl.classList.remove('hidden');

      if (res.ok) {
        setTimeout(() => window.location.href = '/login', 2000);
      }
    }
  </script>
</body>
</html>
