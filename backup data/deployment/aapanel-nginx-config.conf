# SSO Portal - Contoh Konfigurasi Nginx untuk aaPanel
# Copy ke: /www/server/nginx/conf/vhost/portal.hqmedan.com.conf
# Sesuaikan domain sesuai kebutuhan Anda

upstream sso_portal_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name portal.hqmedan.com;
    
    # Redirect HTTP ke HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.hqmedan.com;
    
    # SSL Certificate (dari Let's Encrypt via aaPanel)
    ssl_certificate /www/server/nginx/conf/ssl/portal.hqmedan.com/fullchain.pem;
    ssl_certificate_key /www/server/nginx/conf/ssl/portal.hqmedan.com/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Compression
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    
    # Logging
    access_log /www/wwwroot/portal.hqmedan.com/logs/access.log;
    error_log /www/wwwroot/portal.hqmedan.com/logs/error.log;
    
    # Root directory
    root /www/wwwroot/portal.hqmedan.com/public;
    
    # Client upload size
    client_max_body_size 50M;
    
    # Static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* ^/(admin\.html|dashboard\.html|login\.html|profile\.html|reset-password\.html|users\.html|403\.html|404\.html)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # API & App routing ke Node.js
    location / {
        proxy_pass http://sso_portal_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://sso_portal_backend;
        access_log off;
        proxy_set_header Host $host;
    }
    
    # Deny access ke file sensitif
    location ~ /\. {
        deny all;
        access_log off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
    }
    
    # Deny access ke file config
    location ~ \.(env|json|config)$ {
        deny all;
        access_log off;
    }
}
